<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PM Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>AI PM Assistant</h1>
        <p class="subtitle">Generate PRDs, User Stories and Feature Plans instantly</p>

        <div class="form-section">

            <label for="productName">Product Name</label>
            <input type="text" id="productName"
                placeholder="e.g. Food Delivery App" />

            <label for="productDescription">Product Description</label>
            <textarea id="productDescription" rows="4"
                placeholder="Describe what your product does and who it is for..."></textarea>

            <div class="tab-buttons">
                <button onclick="generate('prd')" id="btn-prd">Generate PRD</button>
                <button onclick="generate('user-stories')" id="btn-user-stories">User Stories</button>
                <button onclick="generate('prioritize')" id="btn-prioritize">Prioritization</button>
            </div>

        </div>

        <div class="output-section">
            <h2 id="outputTitle">Output</h2>
            <div id="outputContent">Your generated content will appear here...</div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
