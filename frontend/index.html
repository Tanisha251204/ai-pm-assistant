<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PM Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>AI PM Assistant</h1>
        <p class="subtitle">Generate PRDs, User Stories and Feature Plans instantly</p>

        <div class="form-section">

            <label for="productName">Product Name</label>
            <input type="text" id="productName"
                placeholder="e.g. Food Delivery App" />

            <label for="productDescription">Product Description</label>
            <textarea id="productDescription" rows="4"
                placeholder="Describe what your product does and who it is for..."></textarea>
                 
                <div style="margin-top:20px; padding:16px;
                    background:#0f172a; border-radius:8px;
                    border:1px dashed #334155;">
                <label style="color:#94a3b8; font-size:0.85rem;">
                           Upload Reference Document (optional)
                     <p style="color:#475569; font-size:0.8rem; margin:6px 0;">
                          Upload a past PRD or document — AI will match its style
                      <input type="file" id="ragFile" accept=".txt"
                        style="color:#94a3b8; margin-top:8px; font-size:0.85rem;"/>
                       <button onclick="uploadDocument(); return false;"
                          style="margin-top:10px; padding:8px 16px;
                          background:#7c3aed; color:white; border:none;
                         border-radius:6px; cursor:pointer; font-size:0.85rem;">
                         Upload Document
                        </button>
                      <span id="uploadStatus"
                      style="margin-left:10px; font-size:0.8rem; color:#10b981;">
                      </span>
                    </div>

            <div class="tab-buttons">
                <button onclick="generate('prd', event); return false;" id="btn-prd">Generate PRD</button>
                <button onclick="generate('user-stories', event); return false;" id="btn-user-stories">User Stories</button>
                <button onclick="generate('prioritize', event); return false;" id="btn-prioritize">Prioritization</button>
            </div>

        </div>

        <div class="output-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="outputTitle">Output</h2>
                <button
                    id="downloadBtn"
                    onclick="downloadPDF()"
                    style="display:none; padding:10px 20px;
                           background:#10b981; color:white; border:none;
                           border-radius:8px; font-size:0.85rem;
                           font-weight:bold; cursor:pointer;">
                    Download PDF
                </button>
            </div>
            <div id="outputContent">
                Your generated content will appear here...
            </div>
        </div>

        <div class="output-section" style="margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:#6366f1;">History</h2>
                <button onclick="loadHistory()"
                    style="padding:8px 16px; background:#1e293b;
                           border:1px solid #334155; border-radius:6px;
                           color:#94a3b8; cursor:pointer; font-size:0.8rem;">
                    Refresh History
                </button>
            </div>
            <div id="historyContent" style="margin-top:12px; color:#94a3b8;">
                Click Refresh History to load...
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
